<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Parking Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🚗 Smart Parking Finder</h1>
  <input type="text" placeholder="Search location...">
</header>

<main>

  <section class="map">
    <h2>Available Parking</h2>
    <div class="map-box">[ Map Placeholder ]</div>
  </section>

  <section class="list">
    <h2>Nearby Spots</h2>

    <div class="spot">
      <h3>Downtown Garage</h3>
      <p>$5/hr • 3 spots left</p>
      <button>Reserve</button>
    </div>

    <div class="spot">
      <h3>City Lot A</h3>
      <p>$3/hr • 10 spots left</p>
      <button>Reserve</button>
    </div>

    <div class="spot">
      <h3>Mall Parking</h3>
      <p>Free • 5 spots left</p>
      <button>Reserve</button>
    </div>

  </section>

</main>

</body>
</html>
